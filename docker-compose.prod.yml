# Production compose file for pulling prebuilt Docker Hub images.

services:
  backend:
    # Prebuilt backend image
    image: ${DOCKER_IMAGE_BACKEND:-is2ppt/is2ppt-backend:latest}
    container_name: is2ppt-backend
    ports:
      # Host port is controlled by BACKEND_PORT; container port stays 5000.
      - "${BACKEND_PORT:-5011}:5000"
      # OpenAI OAuth callback server
      - "1455:1455"
    # Load environment variables from .env.
    env_file:
      - .env
    # Vertex AI configuration. Uncomment when using Vertex AI.
    # environment:
    #   - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-service-account.json
    volumes:
      # Persistent database
      - ./backend/instance:/app/backend/instance
      # Persistent uploads
      - ./uploads:/app/uploads
      # GCP service account file. Uncomment for Vertex AI.
      # - ./gcp-service-account.json:/app/gcp-service-account.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - is2ppt-network

  frontend:
    # Prebuilt frontend image
    image: ${DOCKER_IMAGE_FRONTEND:-is2ppt/is2ppt-frontend:latest}
    container_name: is2ppt-frontend
    ports:
      - "${FRONTEND_PORT:-3011}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - is2ppt-network

networks:
  is2ppt-network:
    driver: bridge

volumes:
  backend-data:
  uploads-data:
